<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Kerja Internal</title>
    <!-- Tailwind CSS untuk Desain Profesional -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen p-3 sm:p-6 text-xl selection:bg-blue-200">
    
    <!-- BAR NOTIFIKASI AMAN -->
    <div class="max-w-xl mx-auto mb-4 bg-emerald-700 text-white rounded-xl p-3 flex items-center justify-center gap-2 shadow-sm">
        <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-14 h-14 text-cyan-500">
  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751A11.956 11.956 0 0112 2.714z" />
</svg>
        <span class="text-2xl">🔒</span>
        <span class="text-sm font-bold tracking-wide">SISTEM INTERNAL KANTOR AMAN & TERVERIFIKASI</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-15 text-amber-500">
  <path d="M3.375 4.5C2.339 4.5 1.5 5.34 1.5 6.375V13.5h12V6.375c0-1.036-.84-1.875-1.875-1.875h-8.25ZM13.5 15h-12v2.625c0 1.035.84 1.875 1.875 1.875h.375a3 3 0 1 1 6 0h3a.75.75 0 0 0 .75-.75V15Z" />
  <path d="M8.25 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0ZM15.75 6.75a.75.75 0 0 0-.75.75v11.25c0 .087.015.17.042.248a3 3 0 0 1 5.958.464c.853-.175 1.522-.935 1.464-1.883a18.659 18.659 0 0 0-3.732-10.104 1.837 1.837 0 0 0-1.47-.725H15.75Z" />
  <path d="M19.5 19.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0Z" />
</svg>

        <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-14 h-14 text-yellow-500">
  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
</svg>

    </div>

    <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-xl p-6 sm:p-8 border border-slate-200">
        
        <!-- HEADER FORMULIR -->
        <div class="text-center mb-6 border-b pb-4 border-slate-100 flex flex-col items-center">
            <img src="logo_kiri.png" alt="Logo Perusahaan" class="h-16 w-auto object-contain mb-3" onerror="this.style.display='none'">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight uppercase">Formulir Kerja Harian</h2>
            <p class="text-slate-500 text-sm font-medium mt-1">Laporan Jam Kerja & Efisiensi Lembur Karyawan</p>
        </div>

        <!-- FORM UTAMA -->
        <form id="gaptekForm" class="space-y-6">
            
            <!-- BAGIAN 1: PENGATURAN NAMA -->
            <div id="sectionProfil" class="bg-slate-50 p-5 rounded-2xl border-2 border-dashed border-slate-300 space-y-4">
                <p class="font-bold text-slate-700 text-sm text-center uppercase tracking-wider">📋 Pendaftaran Nama Karyawan</p>
                <div>
                    <label class="block font-bold text-slate-800 mb-1 text-base">Nama Lengkap Sesuai KTP :</label>
                    <input type="text" id="employeeName" class="w-full px-4 py-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-base" placeholder="Ketik Nama Lengkap Anda...">
                </div>
                <div>
                    <label class="block font-bold text-slate-800 mb-1 text-base">Bagian / Divisi Kerja :</label>
                    <input type="text" id="division" class="w-full px-4 py-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-base" placeholder="Contoh: Administrasi, Gudang, Operasional...">
                </div>
                <button type="button" onclick="simpanProfil()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-3.5 rounded-xl shadow-md text-base transition">
                    Verifikasi & Simpan Identitas
                </button>
            </div>

            <!-- TAMPILAN NAMA JIKA SUDAH DIVERIFIKASI -->
            <div id="profilTerkunci" class="hidden bg-emerald-50 p-4 rounded-2xl border border-emerald-200 flex justify-between items-center">
                <div>
                    <p class="text-xs text-emerald-700 font-bold uppercase tracking-wider">🟢 Akun Karyawan Aktif:</p>
                    <p id="txtNamaDivisi" class="font-black text-slate-800 text-base mt-0.5"></p>
                </div>
                <button type="button" onclick="ubahProfil()" class="text-xs text-slate-500 font-bold underline p-2 hover:text-red-600">
                    Ubah Data
                </button>
            </div>

            <!-- BAGIAN NEW: WAKTU MULAI & BERES KERJA -->
            <div class="grid grid-cols-2 gap-4 bg-amber-50/60 p-4 rounded-2xl border border-amber-200">
                <div>
                    <label class="block font-bold text-slate-900 text-sm mb-1">⏱️ JAM MULAI :</label>
                    <input type="time" id="jamMulai" required class="w-full px-3 py-2 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-amber-500 text-base bg-white">
                </div>
                <div>
                    <label class="block font-bold text-slate-900 text-sm mb-1">🏁 JAM SELESAI :</label>
                    <input type="time" id="jamSelesai" required class="w-full px-3 py-2 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-amber-500 text-base bg-white">
                </div>
            </div>

            <!-- BAGIAN 2: LAPORAN KERJA -->
            <div class="space-y-2">
                <label class="block font-black text-slate-900 text-lg">Tuliskan Laporan Tugas Hari Ini :</label>
                <textarea id="jobDetail" rows="4" required class="w-full px-4 py-3 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-emerald-600 text-base bg-slate-50 focus:bg-white transition" placeholder="Tulis tugas Anda di sini dengan jelas..."></textarea>
            </div>

            <!-- TOMBOL KIRIM UTAMA -->
            <div>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl text-xl shadow-lg transition active:scale-98 flex flex-col items-center justify-center">
                    <span>📤 KIRIM LAPORAN KE KANTOR</span>
                    <span class="text-xs font-normal text-emerald-100 mt-0.5">Tekan 1x, data akan langsung masuk ke sistem pusat</span>
                </button>
            </div>
        </form>

        <!-- FOOTER JAMINAN KEAMANAN -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center space-y-2">
            <p class="text-xs text-slate-400 font-medium">🛡️ Hak Cipta Sistem Internal Kantor. Seluruh data dilindungi secara internal.</p>
            <div id="statusBox" class="p-3 rounded-xl bg-slate-100 text-center inline-block min-w-[200px]">
                <p id="statusText" class="font-bold text-slate-500 text-xs">Belum ada laporan dikirim hari ini.</p>
            </div>
        </div>

    </div>

    <!-- LOGIKA SISTEM -->
    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwXqyDRdvfovbbwOzD68FAriOQ715_U5TwyAkY1H3Z5NJYru27L1sz5G7j7mqaIAial/exec";

        const sectionProfil = document.getElementById('sectionProfil');
        const profilTerkunci = document.getElementById('profilTerkunci');
        const txtNamaDivisi = document.getElementById('txtNamaDivisi');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');

        function cekProfil() {
            const savedName = localStorage.getItem('gaptek_nama');
            const savedDiv = localStorage.getItem('gaptek_divisi');

            if (savedName && savedDiv) {
                sectionProfil.classList.add('hidden');
                profilTerkunci.classList.remove('hidden');
                txtNamaDivisi.innerText = `${savedName} - Bagian ${savedDiv}`;
            } else {
                sectionProfil.classList.remove('hidden');
                profilTerkunci.classList.add('hidden');
            }
            muatStatusTerakhir();
        }

        function simpanProfil() {
            const name = document.getElementById('employeeName').value.trim();
            const div = document.getElementById('division').value.trim();

            if (!name || !div) {
                alert("Harap isi Nama Lengkap dan Bagian Kerja Anda.");
                return;
            }

            localStorage.setItem('gaptek_nama', name);
            localStorage.setItem('gaptek_divisi', div);
            cekProfil();
        }

        function ubahProfil() {
            if (confirm("Apakah Anda ingin mengubah data identitas karyawan?")) {
                localStorage.removeItem('gaptek_nama');
                localStorage.removeItem('gaptek_divisi');
                cekProfil();
            }
        }

        function muatStatusTerakhir() {
            const terakhirKirim = localStorage.getItem('gaptek_terakhir_kirim');
            if (terakhirKirim) {
                statusBox.className = "p-3 rounded-xl bg-emerald-50 border border-emerald-300 text-center inline-block min-w-[200px]";
                statusText.innerHTML = `🟢 <span class="text-emerald-800 font-bold">LAPORAN DITERIMA PUSAT</span><br><span class="text-[10px] text-slate-400">Jam kirim: ${terakhirKirim}</span>`;
            }
        }

        document.getElementById('gaptekForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = localStorage.getItem('gaptek_nama');
            const division = localStorage.getItem('gaptek_divisi');

            if (!name || !division) {
                alert("Identitas belum diverifikasi. Silakan isi form di atas dahulu.");
                return;
            }

            const jamMulai = document.getElementById('jamMulai').value;
            const jamSelesai = document.getElementById('jamSelesai').value;
            const detail = document.getElementById('jobDetail').value;

            submitBtn.disabled = true;
            submitBtn.className = "w-full bg-slate-300 text-slate-500 font-bold py-4 rounded-2xl text-lg flex flex-col items-center justify-center cursor-not-allowed";
            submitBtn.innerHTML = "<span>⏳ PROSES PENGIRIMAN AMAN...</span>";

            const today = new Date();
            const date = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;

            const dataKirim = { date, name, division, jamMulai, jamSelesai, detail };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataKirim)
            })
            .then(() => {
                localStorage.setItem('gaptek_terakhir_kirim', new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}));
                document.getElementById('jobDetail').value = '';
                document.getElementById('jamMulai').value = '';
                document.getElementById('jamSelesai').value = '';
                alert("Sukses! Laporan Anda telah berhasil masuk ke database kantor.");
                muatStatusTerakhir();
            })
            .catch(error => {
                console.error(error);
                alert("Koneksi terganggu. Silakan cek sinyal internet Anda dan coba lagi.");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl text-xl shadow-lg transition active:scale-98 flex flex-col items-center justify-center";
                submitBtn.innerHTML = "<span>📤 KIRIM LAPORAN KE KANTOR</span><span class='text-xs font-normal text-emerald-100 mt-0.5'>Tekan 1x, data akan langsung masuk ke sistem pusat</span>";
            });
        });

        cekProfil();
    </script>
</body>
</html>>
